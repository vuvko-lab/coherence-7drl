<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>COHERENCE</title>
  <link rel="stylesheet" href="/src/styles.css" />
</head>
<body>
  <button id="settings-btn">[cfg]</button>
  <div id="settings-overlay">
    <div id="settings-panel">
      <div class="panel-edge"><span class="corner">┌</span><span class="label">[ CONFIG ]</span><span class="fill"></span><button class="overlay-close" data-close="settings-overlay">[X]</button><span class="corner">┐</span></div>
      <div class="settings-body">
        <div class="settings-row">
          <label>Font</label>
          <select id="cfg-font">
            <option value='"Courier New", Courier, monospace'>Courier</option>
            <option value='Terminus, monospace'>Terminus</option>
            <option value='Dina, monospace'>Dina</option>
          </select>
        </div>
        <div class="settings-row">
          <label>Font size</label>
          <div class="ascii-slider" id="cfg-font-size-slider">
            <button class="slider-btn" data-dir="-1">-</button>
            <span class="slider-track" data-min="10" data-max="24" data-value="16"></span>
            <button class="slider-btn" data-dir="1">+</button>
          </div>
        </div>
      </div>
      <div class="panel-edge"><span class="corner">└</span><span class="fill"></span><span class="corner">┘</span></div>
    </div>
  </div>
  <div id="game">
    <div id="panel-self"></div>
    <div id="map-container">
      <div class="panel-edge"><span class="corner">┌</span><span class="label">[ MAP ]</span><span class="fill"></span><span class="corner">┐</span></div>
      <div id="map-grid-wrap"></div>
      <div class="panel-edge"><span class="corner">└</span><span class="fill"></span><span class="corner">┘</span></div>
    </div>
    <div id="log-placeholder"></div>
    <div id="message-log">
      <div class="panel-edge"><span class="corner">┌</span><span class="label">[ LOG ]</span><span class="fill"></span><button id="log-expand-btn" class="log-toggle">[ + ]</button><span class="corner">┐</span></div>
      <div class="log-body"></div>
      <div class="panel-edge"><span class="corner">└</span><span class="fill"></span><span class="corner">┘</span></div>
    </div>
  </div>
  <div id="panel-admin"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
